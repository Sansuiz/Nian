<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藏品展架 - Nian</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">✨ Nian's Collection</h1>
            <p class="subtitle">探索我的数字盲盒展架</p>
        </div>
    </header>

    <nav class="filter-nav">
        <div class="container">
            <div class="filter-wrapper">
                <button class="filter-btn active" data-category="all">
                    <span class="icon">🎯</span>
                    <span class="text">全部</span>
                </button>
                <button class="filter-btn" data-category="blindbox">
                    <span class="icon">📦</span>
                    <span class="text">盲盒</span>
                </button>
                <button class="filter-btn" data-category="diecast">
                    <span class="icon">🚗</span>
                    <span class="text">合金车</span>
                </button>
                <button class="filter-btn" data-category="card">
                    <span class="icon">🎴</span>
                    <span class="text">卡片</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="carousel-container">
                <button class="nav-btn prev-btn" id="prev-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                
                <div class="carousel-track" id="carousel-track"></div>
                
                <button class="nav-btn next-btn" id="next-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
            
            <div class="carousel-indicators" id="carousel-indicators"></div>
            
            <div class="collection-count" id="collection-count"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Made with 💖 2026</p>
        </div>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

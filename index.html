<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藏品展架 - Nian</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-gradient"></div>
    
    <header class="header">
        <div class="header-content">
            <h1 class="logo">✨ Nian's Collection</h1>
            <p class="tagline">我的藏品空间</p>
        </div>
    </header>

    <nav class="category-nav">
        <button class="category-btn active" data-category="all">
            <span class="icon">🎯</span>
            <span class="label">全部</span>
        </button>
        <button class="category-btn" data-category="blindbox">
            <span class="icon">📦</span>
            <span class="label">盲盒</span>
        </button>
        <button class="category-btn" data-category="diecast">
            <span class="icon">🚗</span>
            <span class="label">合金车</span>
        </button>
        <button class="category-btn" data-category="card">
            <span class="icon">🎴</span>
            <span class="label">卡片</span>
        </button>
    </nav>

    <main class="main">
        <div id="grid" class="masonry-grid">
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <button class="modal-close" id="modalClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <div id="modalContent" class="modal-content"></div>
        </div>
    </div>

    <footer class="footer">
        <p>Made with 💖 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

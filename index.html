<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藏品展架 - Nian</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <header class="header">
        <div class="container">
            <h1 class="logo">✨ Nian's Collection</h1>
            <p class="subtitle">探索我的数字盲盒展架</p>
        </div>
    </header>

    <nav class="filter-nav">
        <div class="container">
            <div class="filter-section">
                <div class="filter-label">
                    <span class="label-icon">📦</span>
                    <span class="label-text">分类</span>
                </div>
                <div class="filter-wrapper category-filter">
                    <button class="filter-btn active" data-type="category" data-category="all">
                        <span class="icon">🎯</span>
                        <span class="text">全部</span>
                    </button>
                    <button class="filter-btn" data-type="category" data-category="blindbox">
                        <span class="icon">📦</span>
                        <span class="text">盲盒</span>
                    </button>
                    <button class="filter-btn" data-type="category" data-category="diecast">
                        <span class="icon">🚗</span>
                        <span class="text">合金车</span>
                    </button>
                    <button class="filter-btn" data-type="category" data-category="card">
                        <span class="icon">🎴</span>
                        <span class="text">卡片</span>
                    </button>
                </div>
            </div>
            <div class="filter-section">
                <div class="filter-label">
                    <span class="label-icon">⭐</span>
                    <span class="label-text">稀有度</span>
                </div>
                <div class="filter-wrapper rarity-filter">
                    <button class="filter-btn active" data-type="rarity" data-rarity="all">
                        <span class="rarity-dot all"></span>
                        <span class="text">全部</span>
                    </button>
                    <button class="filter-btn" data-type="rarity" data-rarity="common">
                        <span class="rarity-dot common"></span>
                        <span class="text">普通</span>
                    </button>
                    <button class="filter-btn" data-type="rarity" data-rarity="rare">
                        <span class="rarity-dot rare"></span>
                        <span class="text">稀有</span>
                    </button>
                    <button class="filter-btn" data-type="rarity" data-rarity="epic">
                        <span class="rarity-dot epic"></span>
                        <span class="text">史诗</span>
                    </button>
                    <button class="filter-btn" data-type="rarity" data-rarity="legendary">
                        <span class="rarity-dot legendary"></span>
                        <span class="text">传说</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div id="collection-grid" class="collection-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>Made with 💖 2026</p>
        </div>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-wrapper">
            <div class="modal-glow"></div>
            <button class="modal-close">&times;</button>
            <div class="modal-content" id="modal-content">
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="app.js"></script>
</body>
</html>

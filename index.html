<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藏品展架 - Nian</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <header class="hero">
        <div class="hero-content">
            <h1 class="title-float">✨ Nian's Collection</h1>
            <p class="subtitle">探索我的数字盲盒宇宙</p>
        </div>
    </header>

    <nav class="orbital-nav">
        <div class="nav-center">
            <div class="planet active" data-category="all">
                <div class="planet-inner">
                    <span class="planet-icon">🎯</span>
                    <span class="planet-label">全部</span>
                </div>
            </div>
        </div>
        <div class="nav-orbit">
            <div class="planet" data-category="blindbox" style="--angle: 0deg;">
                <div class="planet-inner">
                    <span class="planet-icon">📦</span>
                    <span class="planet-label">盲盒</span>
                </div>
            </div>
            <div class="planet" data-category="diecast" style="--angle: 90deg;">
                <div class="planet-inner">
                    <span class="planet-icon">🚗</span>
                    <span class="planet-label">合金车</span>
                </div>
            </div>
            <div class="planet" data-category="card" style="--angle: 180deg;">
                <div class="planet-inner">
                    <span class="planet-icon">🎴</span>
                    <span class="planet-label">卡片</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="gallery">
        <div class="gallery-container">
            <div id="collection-cards" class="cards-container">
            </div>
        </div>
        
        <div class="nav-arrows">
            <button class="nav-btn prev-btn" id="prevBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <div class="page-indicator" id="pageIndicator"></div>
            <button class="nav-btn next-btn" id="nextBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </button>
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-wrapper">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
